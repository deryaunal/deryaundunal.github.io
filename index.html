<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bizim Hikayemiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #fdf7f2;
      --blush: #f5e3de;
      --blush2: #eeddd8;
      --rose: #c47b72;
      --rose-dark: #9e5e56;
      --rose-light: #e8b5af;
      --text: #3a2828;
      --text-light: #7a5252;
      --white: #fffcfa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Nunito',sans-serif;
      background:var(--cream);
      color:var(--text);
      min-height:100vh;
      font-weight:300;
    }

    /* HEARTS */
    .hearts-bg { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
    .heart-float {
      position:absolute;opacity:0;
      animation:floatUp linear infinite;
      color:var(--rose-light);user-select:none;
    }
    @keyframes floatUp {
      0%   { transform:translateY(105vh) rotate(-10deg);opacity:0; }
      8%   { opacity:0.3; }
      92%  { opacity:0.12; }
      100% { transform:translateY(-8vh) rotate(10deg);opacity:0; }
    }

    /* LOCK SCREEN */
    #lock-screen {
      position:fixed;inset:0;background:var(--cream);
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;z-index:1000;gap:1.2rem;padding:2rem;
    }
    .lock-petal { font-size:3rem;animation:pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.1);} }
    #lock-screen h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.2rem,6vw,3.5rem);font-weight:300;
      color:var(--text);text-align:center;line-height:1.2;
    }
    #lock-screen h1 em { font-style:italic;color:var(--rose); }
    .lock-sub { font-size:0.82rem;color:var(--text-light);letter-spacing:0.15em;text-transform:uppercase; }
    .lock-input-wrap { display:flex;flex-direction:column;align-items:center;gap:0.8rem;margin-top:0.5rem; }
    #lock-screen input {
      border:none;border-bottom:1.5px solid var(--rose);background:transparent;
      padding:0.6rem 0.5rem;font-size:1.1rem;font-family:'Nunito',sans-serif;
      color:var(--text);outline:none;text-align:center;width:220px;letter-spacing:0.25em;
    }
    #lock-screen input::placeholder { letter-spacing:0.15em;color:var(--rose-light); }
    #lock-btn {
      background:var(--rose);color:white;border:none;
      padding:0.75rem 2.2rem;font-family:'Nunito',sans-serif;
      font-size:0.85rem;font-weight:500;letter-spacing:0.14em;
      text-transform:uppercase;cursor:pointer;border-radius:40px;
      transition:background 0.3s,transform 0.15s;
    }
    #lock-btn:hover { background:var(--rose-dark);transform:scale(1.02); }
    #lock-error { color:#c04040;font-size:0.8rem;display:none;animation:shake 0.4s; }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      25%{transform:translateX(-6px);}
      75%{transform:translateX(6px);}
    }

    /* MAIN */
    #main-content { display:none;position:relative;z-index:1; }

    /* HEADER */
    header {
      text-align:center;padding:5rem 1.5rem 4rem;
      background:linear-gradient(180deg,var(--blush) 0%,var(--cream) 100%);
      position:relative;overflow:hidden;
    }
    header::after {
      content:'';position:absolute;bottom:0;left:50%;
      transform:translateX(-50%);width:80px;height:1px;background:var(--rose-light);
    }
    .header-tag {
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:1rem;color:var(--rose);letter-spacing:0.18em;margin-bottom:1rem;
    }
    header h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3rem,7vw,5rem);font-weight:300;
      color:var(--text);line-height:1.1;
    }
    header h1 em { font-style:italic;color:var(--rose); }
    .header-sub { margin-top:1.2rem;font-size:0.88rem;color:var(--text-light);letter-spacing:0.1em; }

    /* NAV */
    nav {
      display:flex;justify-content:center;gap:0.5rem;flex-wrap:wrap;
      padding:1.5rem 1rem;position:sticky;top:0;
      background:rgba(253,247,242,0.92);backdrop-filter:blur(8px);
      z-index:100;border-bottom:1px solid rgba(196,123,114,0.12);
    }
    nav a {
      text-decoration:none;color:var(--text-light);font-size:0.8rem;
      letter-spacing:0.1em;text-transform:uppercase;
      padding:0.4rem 1rem;border-radius:20px;transition:background 0.2s,color 0.2s;
    }
    nav a:hover { background:var(--blush);color:var(--rose-dark); }

    /* SECTION LABEL */
    .section-label { text-align:center;padding:3.5rem 1rem 0.5rem; }
    .section-label h2 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(1.8rem,4vw,2.6rem);font-weight:300;color:var(--text);
    }

    /* CARDS */
    .cards-grid {
      display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:1.2rem;max-width:920px;margin:2rem auto;padding:0 1.5rem 1rem;
    }
    .event-card {
      background:var(--white);border-radius:18px;padding:2rem 1.5rem;
      box-shadow:0 2px 20px rgba(180,100,90,0.07);cursor:pointer;
      transition:transform 0.28s cubic-bezier(.34,1.56,.64,1),box-shadow 0.28s;
      border:1px solid rgba(196,123,114,0.13);text-align:center;
    }
    .event-card:hover { transform:translateY(-6px); }
    .event-card .ev-emoji { font-size:2.5rem;margin-bottom:0.7rem; }
    .event-card h3 { font-family:'Cormorant Garamond',serif;font-size:1.35rem; }
    .event-card .ev-date { font-size:0.75rem;color:var(--text-light);text-transform:uppercase; margin: 5px 0;}
    .event-card .day-num { font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--rose);font-style:italic;line-height:1; }

    /* FAVORİLER */
    .fav-grid {
      display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
      gap:1rem;max-width:900px;margin:2rem auto;padding:0 1.5rem 1rem;
    }
    .fav-card {
      background:var(--white);border-radius:16px;padding:1.6rem 1.3rem;
      box-shadow:0 2px 16px rgba(180,100,90,0.06);text-align:center;
    }
    .fav-icon { font-size:2rem;margin-bottom:0.7rem;display:block; }
    .fav-label { font-size:0.68rem;text-transform:uppercase;color:var(--rose); }

    /* MODAL */
    .modal-overlay {
      display:none;position:fixed;inset:0;
      background:rgba(40,25,25,0.45);backdrop-filter:blur(6px);
      z-index:500;align-items:flex-start;justify-content:center;
      padding:1.5rem 1rem 2rem;overflow-y:auto;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--cream);border-radius:22px;max-width:660px;width:100%;
      padding:2.5rem 2rem;position:relative;margin:auto;
    }
    .modal-close {
      position:absolute;top:1rem;right:1.5rem;border:none;background:none;font-size:1.5rem;cursor:pointer;
    }
    .modal-top { text-align:center;margin-bottom:1.5rem; }
    .counter-block {
      background:var(--blush);border-radius:14px;padding:1.2rem;
      margin-bottom:1.5rem;display:flex;justify-content:center;gap:20px;
    }
    .c-num { font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--rose); }
    .photo-grid { display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:15px; margin-top:15px; }
    .photo-item img { width:100%; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); object-fit: cover; aspect-ratio: 1/1;}
    .slot-name { font-size:0.75rem; text-align:center; display:block; margin-top:5px;}

    /* FOOTER */
    footer { text-align:center;padding:3rem 1rem; }
    .ft-names { font-size:0.8rem;color:var(--rose);text-transform:uppercase; }
  </style>
</head>
<body>

<div class="hearts-bg" id="hearts-bg"></div>

<div id="lock-screen">
  <div class="lock-petal">🌸</div>
  <h1>Bizim <em>Hikayemiz</em></h1>
  <p class="lock-sub">şifreni gir</p>
  <div class="lock-input-wrap">
    <input type="password" id="pw-input" placeholder="••••••" />
    <span id="lock-error">Yanlış şifre! 🌸</span>
    <button id="lock-btn" onclick="checkPw()">Gir ♡</button>
  </div>
</div>

<div id="main-content">
  <header>
    <h1>Bizim <em>Hikayemiz</em></h1>
    <p class="header-sub">her anımız burada saklı</p>
  </header>

  <nav>
    <a href="#events">Özel Günler</a>
    <a href="#favorites">Favoriler</a>
  </nav>

  <section id="events">
    <div class="section-label"><h2>Özel Günlerimiz</h2></div>
    <div class="cards-grid" id="cards-grid"></div>
  </section>

  <section id="favorites">
    <div class="section-label"><h2>Derya'nın Favorileri</h2></div>
    <div class="fav-grid" id="fav-grid"></div>
  </section>

  <footer>
    <p class="ft-names">✦ Derya &amp; Ünal ✦</p>
  </footer>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SIFRE = "derya1994";

const events = [
  {
    emoji: "💫",
    title: "Konuşmaya Başladığımız İlk Tarih",
    date: "2024-06-26",
    memory: "O gün her şeyin başlangıcıydı...",
    photos: []
  },
  {
    emoji: "💕",
    title: "Sevgili Olduk",
    date: "2024-08-24",
    memory: "Hayatımızın en güzel 'Evet'lerinden biri.",
    photos: [
      { name: "İlk fotoğrafımız", src: "foto1.jpg" }
    ]
  },
  {
    emoji: "💍",
    title: "Nişanlandık",
    date: "2025-06-25",
    memory: "Geleceğe bir adım daha...",
    photos: [
      { name: "Yüzük anı", src: "foto2.jpg" },
      { name: "Ailemiz", src: "foto3.jpg" }
    ]
  },
  {
    emoji: "👰‍♀️🤵‍♂️",
    title: "Düğün Günümüz",
    date: "2025-09-09",
    memory: "Sonsuza kadar beraber.",
    photos: [
      { name: "Mutlu gün", src: "foto4.jpg" }
    ]
  }
];

const favorites = [
  { icon: "🍝", label: "Yemek", title: "Humus & Adana Kebap" },
  { icon: "🎨", label: "Renk", title: "Beyaz & Mavi" },
  { icon: "🎵", label: "Müzik", title: "Pop" },
  { icon: "☕", label: "İçecek", title: "Türk Kahvesi" },
  { icon: "🌸", label: "Çiçek", title: "Begonvil" }
];

function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === SIFRE) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    buildCards();
    buildFavorites();
    spawnHearts();
  } else {
    document.getElementById('lock-error').style.display = 'block';
  }
}

function daysSince(dateStr) {
  const past = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - past) / 86400000);
}

function buildCards() {
  const grid = document.getElementById('cards-grid');
  events.forEach((ev, i) => {
    const days = daysSince(ev.date);
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div class="ev-emoji">${ev.emoji}</div>
      <h3>${ev.title}</h3>
      <p class="ev-date">${ev.date}</p>
      <div class="day-num">${days}</div>
      <p>gün</p>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });
}

function buildFavorites() {
  const grid = document.getElementById('fav-grid');
  favorites.forEach(fav => {
    const card = document.createElement('div');
    card.className = 'fav-card';
    card.innerHTML = <span class="fav-icon">${fav.icon}</span><span class="fav-label">${fav.label}</span><h4>${fav.title}</h4>;
    grid.appendChild(card);
  });
}

function openModal(index) {
  const ev = events[index];
  const days = daysSince(ev.date);
  
  // FOTOĞRAFLARI GÖSTEREN KISIM BURASI
  const photosHTML = ev.photos.map(p => `
    <div class="photo-item">
      <img src="${p.src}" alt="${p.name}">
      <span class="slot-name">${p.name}</span>
    </div>
  `).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-top">
      <h2>${ev.title}</h2>
      <p>${ev.date}</p>
    </div>
    <div class="counter-block">
      <div><div class="c-num">${days}</div><p>Gün</p></div>
    </div>
    <div style="margin-bottom:20px;">
      <p><i>${ev.memory}</i></p>
    </div>
    <div class="photo-grid">${photosHTML}</div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id === 'modal-overlay') closeModal(); }

function spawnHearts() {
  const container = document.getElementById('hearts-bg');
  for (let i = 0; i < 15; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = '❤';
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (10 + Math.random() * 10) + 's';
    h.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(h);
  }
}
</script>
</body>
</html>
